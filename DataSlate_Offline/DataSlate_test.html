<!-- Reference-only legacy online file for DataSlate_Offline migration. Not used by active offline generator. -->
<!-- Plik interfejsu modułu: struktura sekcji i elementy interaktywne / Module UI file: section structure and interactive elements -->
<!doctype html>
<html lang="pl">
<!-- Sekcja konfiguracji dokumentu i zasobów / Document configuration and asset section -->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Infoczytnik</title>
  <!-- Skrypt odpowiedzialny za interakcję strony / Script responsible for page interactions -->
<script>
    (function autoCacheBust(){
      const INF_VERSION = "2026-05-28_14-50-22";
      window.__dsVersion = INF_VERSION;
      const url = new URL(window.location.href);
      if (url.searchParams.get("v") !== INF_VERSION) {
        url.searchParams.set("v", INF_VERSION);
        window.location.replace(url.toString());
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;700&family=Rajdhani:wght@400;600&family=IBM+Plex+Serif:wght@400;700&family=Open+Sans:wght@400;600;700&family=Noto+Serif:wght@400;700&family=DM+Serif+Display&family=IBM+Plex+Sans+Condensed:wght@400;600;700&family=Exo+2:wght@400;600;700&family=Black+Ops+One&family=Staatliches&family=Orbitron:wght@400;700&family=Questrial&family=Russo+One&family=Caveat:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <!-- Lokalna sekcja stylów dla bieżącego widoku / Local style section for current view -->
<style>
    :root{--font:"Share Tech Mono",Calibri,Arial,sans-serif;--msg:#00ff66;--ps:#ffffff;--overlayW:960;--overlayH:540;--overlayMin:540;--overlayScale:1;--overlayPadY:14px;--overlayPadX:20px;--overlayGap:14px;--msgBasePx:20;--psBasePx:12}
    *{box-sizing:border-box} body{margin:0;background:#000;color:#fff;font-family:var(--font);overflow:hidden}
    .screen{width:100vw;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:0}
    .overlay{position:absolute;z-index:2;overflow:hidden}
    .overlay::after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.28);filter:blur(2px);z-index:1;pointer-events:none;opacity:0}
    .overlay.shadow::after{opacity:1}
    .overlayScroll{position:relative;z-index:2;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:var(--overlayPadY) var(--overlayPadX);display:flex;flex-direction:column;gap:var(--overlayGap);text-shadow:0 2px 5px rgba(0,0,0,.8);overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
    .overlayScroll,.topBand,.msg,.suffix{white-space:pre-wrap;word-break:normal;overflow-wrap:normal;hyphens:manual}
    .topBand{min-height:calc(var(--fillerBandLines,2) * 1.35em);display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;column-gap:12px}
    .topBand.no-logo{grid-template-columns:minmax(0,1fr)}
    .prefix,.suffix{color:var(--ps);font-size:clamp(12px,calc(var(--psBasePx) * 1px * var(--overlayScale)),28px);line-height:1.3;text-align:center}
    .msg{flex:1 0 auto;color:var(--msg);font-size:clamp(16px,calc(var(--msgBasePx) * 1px * var(--overlayScale)),44px);line-height:1.32;text-align:left}
    .bottomBand{min-height:calc(var(--fillerBandLines,2) * 1.35em);display:flex;align-items:flex-end;justify-content:center}
    .logo{justify-self:end;align-self:start;display:none;width:var(--logoSize,84px);height:var(--logoSize,84px);background:var(--logoColor,#d4af37);-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;-webkit-mask-size:contain;mask-repeat:no-repeat;mask-position:center;mask-size:contain}
    .hide{display:none!important}
    .flicker{animation:flicker 7s infinite} @keyframes flicker{0%,100%{opacity:1}50%{opacity:.96}51%{opacity:.9}52%{opacity:1}}
  </style>
</head>
<!-- Główna sekcja widoczna dla użytkownika / Main section visible to the user -->
<body>
<div class="screen" id="screen">
  <img id="bg" class="bg" alt="layout">
  <div id="overlay" class="overlay">
    <div id="overlayScroll" class="overlayScroll">
      <div id="topBand" class="topBand">
        <div id="prefix" class="prefix"></div>
        <div id="logo" class="logo" aria-hidden="true"></div>
      </div>
      <div id="msg" class="msg"></div>
      <div class="bottomBand">
        <div id="suffix" class="suffix"></div>
      </div>
    </div>
  </div>
</div>
<!-- WAŻNE: Po skopiowaniu modułu na inny serwer każda grupa musi podmienić config/firebase-config.js na własny projekt Firebase. / IMPORTANT: After copying this module to another server, each group must replace config/firebase-config.js with its own Firebase project. -->
<script src="config/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-firestore-compat.js"></script>
<script>
const PING_URL = 'assets/audios/ping/Ping.mp3?v=' + encodeURIComponent(window.__dsVersion || '');
const FONT_FALLBACK = ', Calibri, Arial, sans-serif';
const DEFAULT_CONTENT_RECT = { x:0.10, y:0.16, w:0.80, h:0.74 };
const CONTENT_RECTS_BY_BACKGROUND_ID = {
  // Recalculated from *_ramka.png blue-frame overlays (DataSlate/assets/data/Mapowanie.xlsx)
  1:{ x:0.0642, y:0.0762, w:0.8707, h:0.8124 }, // DataSlate_01
  2:{ x:0.1255, y:0.0924, w:0.7091, h:0.7574 }, // DataSlate_02
  3:{ x:0.1048, y:0.1435, w:0.8094, h:0.6745 }, // DataSlate_03
  4:{ x:0.1123, y:0.1481, w:0.7745, h:0.7262 }, // DataSlate_04
  5:{ x:0.0329, y:0.0242, w:0.9362, h:0.9325 }, // DataSlate_05
  6:{ x:0.1004, y:0.0450, w:0.8246, h:0.7801 }, // DataSlate_Inq
  7:{ x:0.1987, y:0.1254, w:0.6207, h:0.7643 }, // Litannie_Zagubionych
  8:{ x:0.0361, y:0.0280, w:0.9248, h:0.9447 }, // Notatnik
  9:{ x:0.0771, y:0.1302, w:0.8672, h:0.6973 }, // Pergamin
  10:{ x:0.1214, y:0.0962, w:0.7385, h:0.8081 } // WnG
};
// --- WAŻNE: Każda grupa musi mieć własny Firebase, inaczej dane będą współdzielone między serwerami. / IMPORTANT: Each group must have its own Firebase, otherwise data will be shared across servers. ---
if(!window.firebaseConfig){ throw new Error('Missing firebase config'); }
firebase.initializeApp(window.firebaseConfig);
const db = firebase.firestore();
const ref = db.collection('dataslate').doc('current');

const el = { screen:document.getElementById('screen'), bg:document.getElementById('bg'), logo:document.getElementById('logo'), overlay:document.getElementById('overlay'), overlayScroll:document.getElementById('overlayScroll'), topBand:document.getElementById('topBand'), prefix:document.getElementById('prefix'), msg:document.getElementById('msg'), suffix:document.getElementById('suffix') };
let lastNonce = '';
const PRELOAD_FONT_FAMILIES = ['Share Tech Mono','Cinzel','Rajdhani','IBM Plex Serif','Open Sans','Noto Serif','DM Serif Display','IBM Plex Sans Condensed','Exo 2','Black Ops One','Staatliches','Orbitron','Questrial','Russo One','Caveat','Great Vibes'];

async function preloadKnownFonts(){
  if(!document.fonts || typeof document.fonts.load !== 'function') return;
  await Promise.all(PRELOAD_FONT_FAMILIES.map(fontName => document.fonts.load(`16px "${fontName}"`)));
}
let currentBackgroundId = 1;
let resizeRaf = 0;
let resizeDebounce = 0;
let lastViewport = { w:0, h:0 };

function clamp(v,min,max,d){ const n=Number(v); if(!Number.isFinite(n)) return d; return Math.min(max,Math.max(min,Math.floor(n))); }
function play(url){
  const a = new Audio(url || PING_URL); a.volume = 1; a.play().catch(()=>{});
}
function getViewportSize(){
  const vv = window.visualViewport;
  if(vv && Number.isFinite(vv.width) && Number.isFinite(vv.height)){
    return { w: Math.round(vv.width), h: Math.round(vv.height) };
  }
  return {
    w: Math.round(window.innerWidth || document.documentElement.clientWidth || 0),
    h: Math.round(window.innerHeight || document.documentElement.clientHeight || 0)
  };
}
function updateOverlayMetrics(width,height){
  const overlayMin = Math.max(1, Math.min(width, height));
  const overlayScale = Math.max(0.75, Math.min(1.45, overlayMin / 560));
  const padY = Math.round(Math.max(10, Math.min(26, overlayMin * 0.026)));
  const padX = Math.round(Math.max(14, Math.min(34, width * 0.04)));
  const gap = Math.round(Math.max(8, Math.min(24, overlayMin * 0.024)));

  document.documentElement.style.setProperty('--overlayW', `${width}`);
  document.documentElement.style.setProperty('--overlayH', `${height}`);
  document.documentElement.style.setProperty('--overlayMin', `${overlayMin}`);
  document.documentElement.style.setProperty('--overlayScale', `${overlayScale.toFixed(3)}`);
  document.documentElement.style.setProperty('--overlayPadY', `${padY}px`);
  document.documentElement.style.setProperty('--overlayPadX', `${padX}px`);
  document.documentElement.style.setProperty('--overlayGap', `${gap}px`);
}
function applyStyles(d){
  const msgColor = String(d.messageColor || d.color || '#00ff66');
  const psColor = String(d.prefixColor || '#ffffff');
  document.documentElement.style.setProperty('--msg', msgColor);
  document.documentElement.style.setProperty('--ps', psColor);
  document.documentElement.style.setProperty('--msgBasePx', String(clamp(d.msgFontSize,12,80,20)));
  document.documentElement.style.setProperty('--psBasePx', String(clamp(d.prefixFontSize,10,60,12)));
  const family = String(d.fontPreset || 'Share Tech Mono');
  document.documentElement.style.setProperty('--font', `"${family}"${FONT_FALLBACK}`);
  document.documentElement.style.setProperty('--fillerBandLines', String(clamp(d.fillerBandLines,1,6,2)));
  document.documentElement.style.setProperty('--logoColor', String(d.logoColor || '#d4af37'));
}
function applyLayout(d){
  currentBackgroundId = Number(d.backgroundId) || 1;
  el.bg.src = d.backgroundFile || 'assets/backgrounds/DataSlate_04.png';
  if(d.showLogo === false || !d.logoFile){
    el.logo.classList.add('hide');
    el.logo.style.display = 'none';
    el.logo.style.webkitMaskImage = 'none';
    el.logo.style.maskImage = 'none';
    el.topBand.classList.add('no-logo');
  } else {
    el.logo.classList.remove('hide');
    el.logo.style.display = 'block';
    el.logo.style.webkitMaskImage = `url(${d.logoFile})`;
    el.logo.style.maskImage = `url(${d.logoFile})`;
    el.topBand.classList.remove('no-logo');
  }
  el.overlay.classList.toggle('shadow', d.movingOverlay !== false);
  el.overlay.classList.toggle('flicker', d.flicker === true);
  el.overlayScroll.scrollTop = 0;
  fitOverlayToBackground();
}
function applyMessage(d){
  const prefix = (Array.isArray(d.prefixLines) ? d.prefixLines.join('\n') : (d.prefix || ''));
  const suffix = (Array.isArray(d.suffixLines) ? d.suffixLines.join('\n') : (d.suffix || ''));
  el.prefix.textContent = d.fillersEnabled === false ? '' : prefix;
  el.suffix.textContent = d.fillersEnabled === false ? '' : suffix;
  el.msg.textContent = d.text || '';
}
function clearMessage(){ el.prefix.textContent=''; el.suffix.textContent=''; el.msg.textContent=''; }
function fitOverlayToBackground(){
  const viewport = getViewportSize();
  const vw = viewport.w;
  const vh = viewport.h;
  const nw = el.bg.naturalWidth || vw;
  const nh = el.bg.naturalHeight || vh;
  if(!vw || !vh || !nw || !nh){
    el.overlay.style.left = '0px'; el.overlay.style.top = '0px'; el.overlay.style.width = '100vw'; el.overlay.style.height = '100dvh';
    updateOverlayMetrics(vw || 1, vh || 1);
    return;
  }
  const scale = Math.min(vw / nw, vh / nh);
  const rw = Math.max(1, Math.round(nw * scale));
  const rh = Math.max(1, Math.round(nh * scale));
  const frameLeft = Math.round((vw - rw) / 2);
  const frameTop = Math.round((vh - rh) / 2);
  const rect = CONTENT_RECTS_BY_BACKGROUND_ID[currentBackgroundId] || DEFAULT_CONTENT_RECT;
  const left = frameLeft + Math.round(rw * rect.x);
  const top = frameTop + Math.round(rh * rect.y);
  const width = Math.max(1, Math.round(rw * rect.w));
  const height = Math.max(1, Math.round(rh * rect.h));
  el.overlay.style.left = `${left}px`;
  el.overlay.style.top = `${top}px`;
  el.overlay.style.width = `${width}px`;
  el.overlay.style.height = `${height}px`;
  const logoSize = Math.max(38, Math.round(width * 0.14));
  document.documentElement.style.setProperty('--logoSize', `${logoSize}px`);
  updateOverlayMetrics(width, height);
}
function scheduleFitOverlay(){
  const viewport = getViewportSize();
  const widthDelta = Math.abs(viewport.w - lastViewport.w);
  const heightDelta = Math.abs(viewport.h - lastViewport.h);
  if(lastViewport.w && widthDelta < 2 && heightDelta < 6){ return; }
  lastViewport = viewport;
  if(resizeRaf){ cancelAnimationFrame(resizeRaf); }
  resizeRaf = requestAnimationFrame(()=>{ fitOverlayToBackground(); resizeRaf = 0; });
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(fitOverlayToBackground, 140);
}

el.bg.addEventListener('load', fitOverlayToBackground);
window.addEventListener('resize', scheduleFitOverlay, { passive:true });
window.addEventListener('orientationchange', scheduleFitOverlay, { passive:true });
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', scheduleFitOverlay, { passive:true });
  window.visualViewport.addEventListener('scroll', scheduleFitOverlay, { passive:true });
}

preloadKnownFonts().catch(()=>{});

ref.onSnapshot((snap)=>{
  const d = snap.data();
  if(!d) return;
  if(d.nonce && d.nonce === lastNonce) return;
  lastNonce = d.nonce || '';

  applyLayout(d); applyStyles(d);
  if(d.type === 'ping'){ play(PING_URL); return; }
  if(d.type === 'clear'){ clearMessage(); return; }
  applyMessage(d);
  if(d.type === 'message' && d.audioEnabled !== false){ play(d.messageAudioFile); }
});
</script>
</body>
</html>
