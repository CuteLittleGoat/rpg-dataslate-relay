<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DataSlate Offline</title>
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, rgba(0, 255, 128, 0.08), transparent 25%),
            radial-gradient(circle at 80% 0%, rgba(255, 210, 122, 0.08), transparent 35%),
            #070707;
      --panel: rgba(18, 18, 18, 0.94);
      --panel-soft: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.14);
      --text: #eaeaea;
      --muted: #bdbdbd;
      --accent: #ffd27a;
      --accent-strong: #ffdf9c;
      --danger: #ffb3b3;
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Calibri, Arial, sans-serif;
      padding: 20px;
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    header,
    section,
    .preview-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1,
    h2 {
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    h1 { font-size: clamp(26px, 4vw, 38px); }
    h2 { font-size: 18px; }

    p { margin: 0; line-height: 1.45; }

    .muted,
    label,
    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    label { display: block; margin: 0 0 6px; }

    select,
    textarea,
    input[type="text"],
    input[type="number"],
    input[type="color"] {
      width: 100%;
      min-height: 42px;
      background: #0f0f0f;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    input[type="color"] { padding: 4px; }

    textarea {
      min-height: 170px;
      resize: vertical;
      line-height: 1.4;
    }

    button {
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #1d1d1d;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 10px 14px;
    }

    button:hover { border-color: rgba(255, 210, 122, 0.75); }
    button.primary { background: linear-gradient(180deg, #4a3413, #1d1408); color: var(--accent-strong); }
    button.secondary { color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
      gap: 16px;
      align-items: start;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full { grid-column: 1 / -1; }

    .field { min-width: 0; }

    .inline {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      color: var(--text);
    }

    .inline input { width: auto; }

    .color-pair {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px;
      gap: 8px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .actions button { flex: 1 1 170px; }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--accent-strong);
      background: rgba(255, 210, 122, 0.06);
      font-size: 13px;
    }

    .font-warning {
      display: none;
      margin-top: 8px;
      color: var(--danger);
    }

    .font-warning.visible { display: block; }

    .preview-panel {
      position: sticky;
      top: 16px;
      display: grid;
      gap: 12px;
    }

    .preview-card {
      position: relative;
      min-height: 520px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #0a0e14;
    }

    .preview-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.92;
    }

    .preview-content {
      position: absolute;
      inset: 9% 9% 10%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: 18px;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.85);
    }

    .preview-logo {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 88px;
      height: 88px;
      background: var(--preview-logo-color, #d4af37);
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      -webkit-mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      mask-size: contain;
      opacity: 0.9;
    }

    .preview-lines,
    .preview-message { white-space: pre-wrap; overflow-wrap: anywhere; }

    .preview-lines { opacity: 0.95; }

    .payload-summary {
      max-height: 220px;
      overflow: auto;
      margin: 0;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--muted);
      font: 12px/1.45 Consolas, "Courier New", monospace;
      white-space: pre-wrap;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .preview-panel { position: static; }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 data-i18n="appTitle">DataSlate Offline</h1>
        <p class="muted" data-i18n="intro">Przygotuj lokalny payload ekranu DataSlate do dalszego renderowania w kolejnych etapach.</p>
      </div>
      <div class="field" style="min-width:170px">
        <label for="languageSelect" data-i18n="languageLabel">Język interfejsu</label>
        <select id="languageSelect" autocomplete="off">
          <option value="pl">Polski</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <div class="layout">
      <section aria-labelledby="generatorTitle">
        <h2 id="generatorTitle" data-i18n="generatorTitle">Panel generatora</h2>
        <div class="form-grid" style="margin-top:14px">
          <div class="field">
            <label for="backgroundSelect" data-i18n="backgroundLabel">Tło</label>
            <select id="backgroundSelect"></select>
          </div>

          <div class="field">
            <label for="logoSelect" data-i18n="logoLabel">Logotyp</label>
            <select id="logoSelect"></select>
          </div>

          <label class="inline field" for="showLogo">
            <input type="checkbox" id="showLogo">
            <span data-i18n="showLogoLabel">Pokaż logo</span>
          </label>

          <div class="field">
            <label for="fontSelect" data-i18n="fontLabel">Font</label>
            <select id="fontSelect"></select>
            <p id="fontWarning" class="font-warning hint" aria-live="polite"></p>
          </div>

          <div class="field">
            <label for="fillerSelect" data-i18n="fillerLabel">Filler</label>
            <select id="fillerSelect"></select>
          </div>

          <label class="inline field" for="fillersEnabled">
            <input type="checkbox" id="fillersEnabled" checked>
            <span data-i18n="fillersEnabledLabel">Pokaż fillery</span>
          </label>

          <div class="field">
            <label for="fillerLineCount" data-i18n="fillerLinesLabel">Liczba linii fillerów</label>
            <input type="number" id="fillerLineCount" min="1" max="5" value="3">
          </div>

          <div class="field">
            <label for="fillerBandLines" data-i18n="fillerBandLabel">Wysokość strefy fillerów</label>
            <input type="number" id="fillerBandLines" min="1" max="6" value="2">
          </div>

          <div class="field">
            <label for="messageColorText" data-i18n="messageColorLabel">Kolor wiadomości</label>
            <div class="color-pair">
              <input type="text" id="messageColorText" value="#00ff66" placeholder="#RRGGBB">
              <input type="color" id="messageColorPicker" value="#00ff66">
            </div>
          </div>

          <div class="field">
            <label for="psColorText" data-i18n="fillerColorLabel">Kolor fillerów</label>
            <div class="color-pair">
              <input type="text" id="psColorText" value="#ffffff" placeholder="#RRGGBB">
              <input type="color" id="psColorPicker" value="#ffffff">
            </div>
          </div>

          <div class="field">
            <label for="logoColorText" data-i18n="logoColorLabel">Kolor loga</label>
            <div class="color-pair">
              <input type="text" id="logoColorText" value="#d4af37" placeholder="#RRGGBB">
              <input type="color" id="logoColorPicker" value="#d4af37">
            </div>
          </div>

          <div class="field">
            <label for="msgFontSize" data-i18n="messageSizeLabel">Rozmiar wiadomości</label>
            <input type="number" id="msgFontSize" min="12" max="80" value="20">
          </div>

          <div class="field">
            <label for="psFontSize" data-i18n="fillerSizeLabel">Rozmiar fillerów</label>
            <input type="number" id="psFontSize" min="10" max="60" value="12">
          </div>

          <div class="field full">
            <label for="message" data-i18n="messageLabel">Treść wiadomości</label>
            <textarea id="message" data-i18n-placeholder="messagePlaceholder" placeholder="Wpisz treść komunikatu dla DataSlate..."></textarea>
          </div>

          <div class="actions full">
            <button type="button" class="primary" id="generateBtn" data-i18n="generateBtn">Generuj</button>
            <button type="button" id="clearMessageBtn" data-i18n="clearMessageBtn">Wyczyść treść</button>
            <button type="button" class="secondary" id="restoreDefaultsBtn" data-i18n="restoreDefaultsBtn">Reset formularza</button>
            <button type="button" class="secondary" id="rerollFillersBtn" data-i18n="rerollFillersBtn">Losuj fillery</button>
          </div>

          <div class="full">
            <span class="status" id="status" data-i18n="statusLoading">Ładowanie danych...</span>
          </div>
        </div>
      </section>

      <aside class="preview-panel" aria-labelledby="previewTitle">
        <h2 id="previewTitle" data-i18n="previewTitle">Podgląd roboczy</h2>
        <div class="preview-card" aria-live="polite">
          <img id="previewBackground" class="preview-background" alt="">
          <div id="previewLogo" class="preview-logo" aria-hidden="true"></div>
          <div id="previewContent" class="preview-content">
            <div id="previewPrefix" class="preview-lines"></div>
            <div id="previewMsg" class="preview-message"></div>
            <div id="previewSuffix" class="preview-lines"></div>
          </div>
        </div>
        <p class="hint" data-i18n="previewHint">Podgląd jest pomocniczy; finalne renderowanie nowej karty należy do kolejnego etapu.</p>
        <pre id="payloadSummary" class="payload-summary" data-i18n="payloadEmpty">Payload nie został jeszcze zbudowany.</pre>
      </aside>
    </div>
  </main>

  <script>
    const DATA_URL = 'assets/data/data.json';
    const FONT_FALLBACK = ', Calibri, Arial, sans-serif';
    const DEFAULT_CONTENT_RECT = { x: 0.10, y: 0.16, w: 0.80, h: 0.74 };
    const CONTENT_RECTS_BY_BACKGROUND_ID = {
      1: { x: 0.0642, y: 0.0762, w: 0.8707, h: 0.8124 },
      2: { x: 0.1255, y: 0.0924, w: 0.7091, h: 0.7574 },
      3: { x: 0.1048, y: 0.1435, w: 0.8094, h: 0.6745 },
      4: { x: 0.1123, y: 0.1481, w: 0.7745, h: 0.7262 },
      5: { x: 0.0329, y: 0.0242, w: 0.9362, h: 0.9325 },
      6: { x: 0.1004, y: 0.0450, w: 0.8246, h: 0.7801 },
      7: { x: 0.1987, y: 0.1254, w: 0.6207, h: 0.7643 },
      8: { x: 0.0361, y: 0.0280, w: 0.9248, h: 0.9447 },
      9: { x: 0.0771, y: 0.1302, w: 0.8672, h: 0.6973 },
      10: { x: 0.1214, y: 0.0962, w: 0.7385, h: 0.8081 }
    };

    const DEFAULT_FORM_STATE = {
      backgroundId: 10,
      logoId: 3,
      fillerId: 1,
      fontId: 1,
      showLogo: false,
      fillersEnabled: true,
      fillerLineCount: 3,
      fillerBandLines: 2,
      messageColor: '#00ff66',
      prefixSuffixColor: '#ffffff',
      logoColor: '#d4af37',
      msgFontSize: 20,
      psFontSize: 12
    };

    const I18N = {
      pl: {
        appTitle: 'DataSlate Offline',
        intro: 'Przygotuj lokalny payload ekranu DataSlate do dalszego renderowania w kolejnych etapach.',
        languageLabel: 'Język interfejsu',
        generatorTitle: 'Panel generatora',
        backgroundLabel: 'Tło',
        logoLabel: 'Logotyp',
        showLogoLabel: 'Pokaż logo',
        fontLabel: 'Font',
        fillerLabel: 'Filler',
        fillersEnabledLabel: 'Pokaż fillery',
        fillerLinesLabel: 'Liczba linii fillerów',
        fillerBandLabel: 'Wysokość strefy fillerów',
        messageColorLabel: 'Kolor wiadomości',
        fillerColorLabel: 'Kolor fillerów',
        logoColorLabel: 'Kolor loga',
        messageSizeLabel: 'Rozmiar wiadomości',
        fillerSizeLabel: 'Rozmiar fillerów',
        messageLabel: 'Treść wiadomości',
        messagePlaceholder: 'Wpisz treść komunikatu dla DataSlate...',
        generateBtn: 'Generuj',
        clearMessageBtn: 'Wyczyść treść',
        restoreDefaultsBtn: 'Reset formularza',
        rerollFillersBtn: 'Losuj fillery',
        statusLoading: 'Ładowanie danych...',
        statusReady: 'Gotowe',
        statusPayloadReady: 'Payload gotowy',
        statusDataError: 'Błąd ładowania danych',
        previewTitle: 'Podgląd roboczy',
        previewHint: 'Podgląd jest pomocniczy; finalne renderowanie nowej karty należy do kolejnego etapu.',
        payloadEmpty: 'Payload nie został jeszcze zbudowany.',
        fontFallback: 'Google Fonts są niedostępne. Generator użyje fontu systemowego.'
      },
      en: {
        appTitle: 'DataSlate Offline',
        intro: 'Prepare a local DataSlate screen payload for rendering in the next stages.',
        languageLabel: 'Interface language',
        generatorTitle: 'Generator panel',
        backgroundLabel: 'Background',
        logoLabel: 'Logo',
        showLogoLabel: 'Show logo',
        fontLabel: 'Font',
        fillerLabel: 'Filler',
        fillersEnabledLabel: 'Show fillers',
        fillerLinesLabel: 'Filler line count',
        fillerBandLabel: 'Filler zone height',
        messageColorLabel: 'Message color',
        fillerColorLabel: 'Filler color',
        logoColorLabel: 'Logo color',
        messageSizeLabel: 'Message size',
        fillerSizeLabel: 'Filler size',
        messageLabel: 'Message text',
        messagePlaceholder: 'Enter the DataSlate message text...',
        generateBtn: 'Generate',
        clearMessageBtn: 'Clear text',
        restoreDefaultsBtn: 'Reset form',
        rerollFillersBtn: 'Reroll fillers',
        statusLoading: 'Loading data...',
        statusReady: 'Ready',
        statusPayloadReady: 'Payload ready',
        statusDataError: 'Data loading error',
        previewTitle: 'Working preview',
        previewHint: 'This is a helper preview; final new-tab rendering belongs to the next stage.',
        payloadEmpty: 'Payload has not been built yet.',
        fontFallback: 'Google Fonts are unavailable. The generator will use a system font.'
      }
    };

    const el = {
      languageSelect: document.getElementById('languageSelect'),
      backgroundSelect: document.getElementById('backgroundSelect'),
      logoSelect: document.getElementById('logoSelect'),
      showLogo: document.getElementById('showLogo'),
      fontSelect: document.getElementById('fontSelect'),
      fontWarning: document.getElementById('fontWarning'),
      fillerSelect: document.getElementById('fillerSelect'),
      fillersEnabled: document.getElementById('fillersEnabled'),
      fillerLineCount: document.getElementById('fillerLineCount'),
      fillerBandLines: document.getElementById('fillerBandLines'),
      messageColorText: document.getElementById('messageColorText'),
      messageColorPicker: document.getElementById('messageColorPicker'),
      psColorText: document.getElementById('psColorText'),
      psColorPicker: document.getElementById('psColorPicker'),
      logoColorText: document.getElementById('logoColorText'),
      logoColorPicker: document.getElementById('logoColorPicker'),
      msgFontSize: document.getElementById('msgFontSize'),
      psFontSize: document.getElementById('psFontSize'),
      message: document.getElementById('message'),
      generateBtn: document.getElementById('generateBtn'),
      clearMessageBtn: document.getElementById('clearMessageBtn'),
      restoreDefaultsBtn: document.getElementById('restoreDefaultsBtn'),
      rerollFillersBtn: document.getElementById('rerollFillersBtn'),
      status: document.getElementById('status'),
      previewBackground: document.getElementById('previewBackground'),
      previewLogo: document.getElementById('previewLogo'),
      previewContent: document.getElementById('previewContent'),
      previewPrefix: document.getElementById('previewPrefix'),
      previewMsg: document.getElementById('previewMsg'),
      previewSuffix: document.getElementById('previewSuffix'),
      payloadSummary: document.getElementById('payloadSummary')
    };

    let manifest = { backgrounds: [], logos: [], fonts: [], fillers: [] };
    let fillerState = { prefixLines: [], suffixLines: [] };
    let lastPayload = null;
    let currentLanguage = 'pl';

    function t(key) {
      return I18N[currentLanguage]?.[key] || I18N.pl[key] || key;
    }

    function applyLanguage(lang) {
      currentLanguage = I18N[lang] ? lang : 'pl';
      document.documentElement.lang = currentLanguage;
      document.querySelectorAll('[data-i18n]').forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach((node) => {
        node.placeholder = t(node.dataset.i18nPlaceholder);
      });
      updateFontWarning();
      if (!lastPayload) el.payloadSummary.textContent = t('payloadEmpty');
      if (el.status.dataset.statusKey) el.status.textContent = t(el.status.dataset.statusKey);
    }

    function setStatus(key) {
      el.status.dataset.statusKey = key;
      el.status.textContent = t(key);
    }

    function clamp(value, min, max, fallback) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.min(max, Math.max(min, Math.floor(number)));
    }

    function normalizeHexColor(value, fallback) {
      const raw = String(value || '').trim();
      if (/^#[0-9a-f]{6}$/i.test(raw)) return raw.toLowerCase();
      const withoutHash = raw.replace(/^#/, '');
      if (/^[0-9a-f]{6}$/i.test(withoutHash)) return `#${withoutHash.toLowerCase()}`;
      return fallback;
    }

    function resolveHexColor(textInput, pickerInput, fallback) {
      return normalizeHexColor(textInput, normalizeHexColor(pickerInput, fallback));
    }

    function safeGet(list, id) {
      return list.find((item) => Number(item.id) === Number(id)) || list[0] || null;
    }

    function fillSelect(select, list, labelBuilder) {
      select.innerHTML = '';
      list.forEach((item) => {
        const option = document.createElement('option');
        option.value = String(item.id);
        option.textContent = labelBuilder ? labelBuilder(item) : `${item.id}. ${item.name || item.file || item.font || item.id}`;
        select.appendChild(option);
      });
    }

    function pickExistingId(list, preferredId) {
      return String((list.find((item) => Number(item.id) === Number(preferredId)) || list[0] || { id: '' }).id);
    }

    function drawFillerLines(lines, count) {
      return [...(lines || [])].sort(() => Math.random() - 0.5).slice(0, count);
    }

    function rerollFillers() {
      const count = clamp(el.fillerLineCount.value, 1, 5, DEFAULT_FORM_STATE.fillerLineCount);
      el.fillerLineCount.value = String(count);
      const filler = safeGet(manifest.fillers || [], el.fillerSelect.value);
      if (el.fillersEnabled.checked && filler) {
        fillerState.prefixLines = drawFillerLines(filler.prefixes, count);
        fillerState.suffixLines = drawFillerLines(filler.suffixes, count);
      } else {
        fillerState.prefixLines = [];
        fillerState.suffixLines = [];
      }
      renderPreview();
    }

    function getSelectedFont() {
      return safeGet(manifest.fonts || [], el.fontSelect.value);
    }

    function isFontAvailable(fontName) {
      if (!fontName || !document.fonts || typeof document.fonts.check !== 'function') return false;
      return document.fonts.check(`16px "${fontName}"`);
    }

    function updateFontWarning() {
      const selectedFont = getSelectedFont();
      const unavailable = selectedFont?.font && !isFontAvailable(selectedFont.font);
      el.fontWarning.textContent = unavailable ? t('fontFallback') : '';
      el.fontWarning.classList.toggle('visible', !!unavailable);
    }

    function applyColorPair(textEl, pickerEl, fallback) {
      const color = resolveHexColor(textEl.value, pickerEl.value, fallback);
      textEl.value = color;
      pickerEl.value = color;
      return color;
    }

    function renderPreview() {
      const bg = safeGet(manifest.backgrounds || [], el.backgroundSelect.value);
      const logo = safeGet(manifest.logos || [], el.logoSelect.value);
      const selectedFont = getSelectedFont();
      const messageColor = applyColorPair(el.messageColorText, el.messageColorPicker, DEFAULT_FORM_STATE.messageColor);
      const fillerColor = applyColorPair(el.psColorText, el.psColorPicker, DEFAULT_FORM_STATE.prefixSuffixColor);
      const logoColor = applyColorPair(el.logoColorText, el.logoColorPicker, DEFAULT_FORM_STATE.logoColor);
      const rect = CONTENT_RECTS_BY_BACKGROUND_ID[Number(bg?.id)] || DEFAULT_CONTENT_RECT;

      el.previewBackground.src = bg?.file || '';
      el.previewLogo.style.display = el.showLogo.checked && logo ? 'block' : 'none';
      el.previewLogo.style.setProperty('--preview-logo-color', logoColor);
      el.previewLogo.style.webkitMaskImage = logo ? `url(${logo.file})` : 'none';
      el.previewLogo.style.maskImage = logo ? `url(${logo.file})` : 'none';
      el.previewContent.style.left = `${rect.x * 100}%`;
      el.previewContent.style.top = `${rect.y * 100}%`;
      el.previewContent.style.right = `${(1 - rect.x - rect.w) * 100}%`;
      el.previewContent.style.bottom = `${(1 - rect.y - rect.h) * 100}%`;
      el.previewContent.style.fontFamily = `"${selectedFont?.font || 'Share Tech Mono'}"${FONT_FALLBACK}`;
      el.previewPrefix.textContent = el.fillersEnabled.checked ? fillerState.prefixLines.join('\n') : '';
      el.previewSuffix.textContent = el.fillersEnabled.checked ? fillerState.suffixLines.join('\n') : '';
      el.previewMsg.textContent = el.message.value || '';
      el.previewPrefix.style.color = fillerColor;
      el.previewSuffix.style.color = fillerColor;
      el.previewMsg.style.color = messageColor;
      el.previewPrefix.style.fontSize = `${clamp(el.psFontSize.value, 10, 60, DEFAULT_FORM_STATE.psFontSize)}px`;
      el.previewSuffix.style.fontSize = `${clamp(el.psFontSize.value, 10, 60, DEFAULT_FORM_STATE.psFontSize)}px`;
      el.previewMsg.style.fontSize = `${clamp(el.msgFontSize.value, 12, 80, DEFAULT_FORM_STATE.msgFontSize)}px`;
      el.fillerLineCount.disabled = !el.fillersEnabled.checked;
      updateFontWarning();
    }

    function nonce() {
      return `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    function buildPayload() {
      const bg = safeGet(manifest.backgrounds || [], el.backgroundSelect.value);
      const logo = safeGet(manifest.logos || [], el.logoSelect.value);
      const filler = safeGet(manifest.fillers || [], el.fillerSelect.value);
      const selectedFont = getSelectedFont();
      return {
        type: 'message',
        text: el.message.value || '',
        backgroundId: bg?.id || null,
        backgroundFile: bg?.file || '',
        logoId: logo?.id || null,
        logoFile: logo?.file || '',
        fillerId: filler?.id || null,
        fillerSet: filler?.name || '',
        fontId: selectedFont?.id || null,
        fontPreset: selectedFont?.font || '',
        fillersEnabled: !!el.fillersEnabled.checked,
        showLogo: !!el.showLogo.checked,
        movingOverlay: false,
        flicker: false,
        prefixLines: el.fillersEnabled.checked ? fillerState.prefixLines : [],
        suffixLines: el.fillersEnabled.checked ? fillerState.suffixLines : [],
        fillerLineCount: clamp(el.fillerLineCount.value, 1, 5, DEFAULT_FORM_STATE.fillerLineCount),
        fillerBandLines: clamp(el.fillerBandLines.value, 1, 6, DEFAULT_FORM_STATE.fillerBandLines),
        messageColor: resolveHexColor(el.messageColorText.value, el.messageColorPicker.value, DEFAULT_FORM_STATE.messageColor),
        logoColor: resolveHexColor(el.logoColorText.value, el.logoColorPicker.value, DEFAULT_FORM_STATE.logoColor),
        prefixColor: resolveHexColor(el.psColorText.value, el.psColorPicker.value, DEFAULT_FORM_STATE.prefixSuffixColor),
        suffixColor: resolveHexColor(el.psColorText.value, el.psColorPicker.value, DEFAULT_FORM_STATE.prefixSuffixColor),
        msgFontSize: clamp(el.msgFontSize.value, 12, 80, DEFAULT_FORM_STATE.msgFontSize),
        prefixFontSize: clamp(el.psFontSize.value, 10, 60, DEFAULT_FORM_STATE.psFontSize),
        suffixFontSize: clamp(el.psFontSize.value, 10, 60, DEFAULT_FORM_STATE.psFontSize),
        contentRect: CONTENT_RECTS_BY_BACKGROUND_ID[Number(bg?.id)] || DEFAULT_CONTENT_RECT,
        nonce: nonce(),
        createdAt: new Date().toISOString()
      };
    }

    function restoreDefaults() {
      el.backgroundSelect.value = pickExistingId(manifest.backgrounds || [], DEFAULT_FORM_STATE.backgroundId);
      el.logoSelect.value = pickExistingId(manifest.logos || [], DEFAULT_FORM_STATE.logoId);
      el.fillerSelect.value = pickExistingId(manifest.fillers || [], DEFAULT_FORM_STATE.fillerId);
      el.fontSelect.value = pickExistingId(manifest.fonts || [], DEFAULT_FORM_STATE.fontId);
      el.showLogo.checked = DEFAULT_FORM_STATE.showLogo;
      el.fillersEnabled.checked = DEFAULT_FORM_STATE.fillersEnabled;
      el.fillerLineCount.value = String(DEFAULT_FORM_STATE.fillerLineCount);
      el.fillerBandLines.value = String(DEFAULT_FORM_STATE.fillerBandLines);
      el.messageColorText.value = DEFAULT_FORM_STATE.messageColor;
      el.messageColorPicker.value = DEFAULT_FORM_STATE.messageColor;
      el.psColorText.value = DEFAULT_FORM_STATE.prefixSuffixColor;
      el.psColorPicker.value = DEFAULT_FORM_STATE.prefixSuffixColor;
      el.logoColorText.value = DEFAULT_FORM_STATE.logoColor;
      el.logoColorPicker.value = DEFAULT_FORM_STATE.logoColor;
      el.msgFontSize.value = String(DEFAULT_FORM_STATE.msgFontSize);
      el.psFontSize.value = String(DEFAULT_FORM_STATE.psFontSize);
      el.message.value = '';
      lastPayload = null;
      el.payloadSummary.textContent = t('payloadEmpty');
      rerollFillers();
      setStatus('statusReady');
    }

    async function loadManifest() {
      const response = await fetch(DATA_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Could not load ${DATA_URL}`);
      manifest = await response.json();
      fillSelect(el.backgroundSelect, manifest.backgrounds || []);
      fillSelect(el.logoSelect, manifest.logos || []);
      fillSelect(el.fillerSelect, manifest.fillers || []);
      fillSelect(el.fontSelect, manifest.fonts || [], (item) => `${item.id}. ${item.name || item.font} - ${item.font || ''}`);
      restoreDefaults();
    }

    function handleGenerate() {
      renderPreview();
      lastPayload = buildPayload();
      el.payloadSummary.textContent = JSON.stringify(lastPayload, null, 2);
      setStatus('statusPayloadReady');
    }

    function bindEvents() {
      el.languageSelect.addEventListener('change', () => applyLanguage(el.languageSelect.value));
      [
        el.backgroundSelect,
        el.logoSelect,
        el.showLogo,
        el.fontSelect,
        el.fillerSelect,
        el.fillersEnabled,
        el.fillerBandLines,
        el.messageColorText,
        el.messageColorPicker,
        el.psColorText,
        el.psColorPicker,
        el.logoColorText,
        el.logoColorPicker,
        el.msgFontSize,
        el.psFontSize,
        el.message
      ].forEach((node) => {
        node.addEventListener('input', renderPreview);
        node.addEventListener('change', renderPreview);
      });
      el.fillerLineCount.addEventListener('input', rerollFillers);
      el.fillerLineCount.addEventListener('change', rerollFillers);
      el.fillerSelect.addEventListener('change', rerollFillers);
      el.fillersEnabled.addEventListener('change', rerollFillers);
      el.rerollFillersBtn.addEventListener('click', rerollFillers);
      el.generateBtn.addEventListener('click', handleGenerate);
      el.clearMessageBtn.addEventListener('click', () => {
        el.message.value = '';
        renderPreview();
        el.message.focus();
      });
      el.restoreDefaultsBtn.addEventListener('click', restoreDefaults);
    }

    (async function init() {
      bindEvents();
      applyLanguage(currentLanguage);
      try {
        await loadManifest();
        setStatus('statusReady');
      } catch (error) {
        console.error(error);
        setStatus('statusDataError');
        el.payloadSummary.textContent = String(error.message || error);
      }
    })();
  </script>
</body>
</html>
